<html>

        key: "AIzaSyDcgOu7N-b-YPPIh_nO-14tU1OyHhCAXvk",

      });
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        #map { height: 600px; width: 100%; }
        .info-window { line-height: 1.5; }
    </style>
</head>
<body>
    <h2>町田市 指定収集袋・処理券 取扱店マップ</h2>
    <div id="map"></div>

    <script>
        // 3. 地図の初期化関数を最新形式に対応させる
        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            const { Geocoder } = await google.maps.importLibrary("geocoding");

            const map = new Map(document.getElementById('map'), {
                zoom: 13,
                center: { lat: 35.5467, lng: 139.4464 },
                mapId: "DEMO_MAP_ID",
            });

            const geocoder = new Geocoder();
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbwzmxpYinrqfH8ar2sxf77ku-OJ93QdYLHwMN3daj8XC_cHGHUbC3Tf0ATtU0qzvt2t-w/exec'; 

            // fetchを使ってGASからJSONデータを取得
            fetch(GAS_URL)
                .then(response => response.json())
                .then(data => {
                    console.log("GASから届いたデータ:", data[0]); // 文字化けしてないかチェック！

                    // 負荷軽減のため最初の10件でテスト
                    data.slice(0, 10).forEach(shop => {
                        const name = shop['店舗名'];
                        const address = shop['住所'];
                        
                        if (address) {
                            console.log("解析中:", name, address);
                            geocoder.geocode({ address: "東京都町田市" + address }, (results, status) => {
                                if (status === 'OK') {
                                    new google.maps.marker.AdvancedMarkerElement({
                                        map: map,
                                        position: results[0].geometry.location,
                                        title: name
                                    });
                                    console.log("ピン設置:", name);
                                }
                            });
                        }
                    });
                })
                .catch(error => console.error("データ取得エラー:", error));
        }


        function geocodeAddress(geocoder, map, shop) {
            const address = "東京都町田市" + shop['所在地'];
            geocoder.geocode({ address: address }, (results, status) => {
                if (status === 'OK') {
                    new google.maps.marker.AdvancedMarkerElement({
                        map: map,
                        position: results[0].geometry.location,
                        title: shop['名称']
                    });
                }
            });
        }

        initMap();
    </script>
</body>
</html>
